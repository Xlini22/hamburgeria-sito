<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login panini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <main class="container py-5">
      <h1 class="mb-4">Login panini</h1>

      <form id="login-form" class="card p-4" style="max-width: 24rem;">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input id="username" class="form-control" type="text" placeholder="Username" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" class="form-control" type="password" placeholder="Password" required>
        </div>

        <button id="login-button" type="submit" class="btn btn-primary">Login</button>
        <p id="login-message" class="mt-3 mb-0"></p>
      </form>
    </main>

    <script src="login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
