name: bourmet

services:
  database:
    image: mysql:8.4
    container_name: bourmet_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-hamburgeria}
      MYSQL_USER: ${DB_USER:-bourmet_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT:?DB_ROOT is required}
    volumes:
      - database_data:/var/lib/mysql
      - ./server/nestjs/database/001-current-schema.sql:/docker-entrypoint-initdb.d/001-current-schema.sql:ro
      - ./server/nestjs/database/002-current-seed.sql:/docker-entrypoint-initdb.d/002-current-seed.sql:ro
      - ./server/nestjs/database/003-table-sessions.sql:/docker-entrypoint-initdb.d/003-table-sessions.sql:ro
      - ./server/nestjs/database/004-guest-cart.sql:/docker-entrypoint-initdb.d/004-guest-cart.sql:ro
      - ./server/nestjs/database/005-table-orders.sql:/docker-entrypoint-initdb.d/005-table-orders.sql:ro
      - ./server/docker/mysql/003-runtime-grants.sh:/docker-entrypoint-initdb.d/006-runtime-grants.sh:ro
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3320}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  app:
    container_name: bourmet_app
    build:
      context: .
      dockerfile: server/nestjs/Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-hamburgeria}
      DB_USER: ${DB_USER:-bourmet_app}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PUBLIC_ORDER_URL: ${PUBLIC_ORDER_URL:-/menu/order.html}
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    volumes:
      - uploaded_images:/app/public/images/catalog/uploads
    networks:
      - backend

volumes:
  database_data:
  uploaded_images:

networks:
  backend:
    driver: bridge
